name: Daily Supabase backup

on:
  schedule:
    # 06:00 UTC = 03:00 BRT, fora do horário de uso
    - cron: '0 6 * * *'
  workflow_dispatch: {}

jobs:
  backup:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4

      - name: Install Supabase CLI
        run: |
          curl -fsSL https://github.com/supabase/cli/releases/latest/download/supabase_linux_amd64.tar.gz | tar -xz
          sudo mv supabase /usr/local/bin/supabase
          supabase --version

      - name: Link project
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
        run: supabase link --project-ref ${{ secrets.SUPABASE_PROJECT_REF }}

      - name: Dump schema
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
          SUPABASE_DB_PASSWORD: ${{ secrets.SUPABASE_DB_PASSWORD }}
        run: supabase db dump -f backup-schema.sql

      - name: Dump data
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
          SUPABASE_DB_PASSWORD: ${{ secrets.SUPABASE_DB_PASSWORD }}
        run: supabase db dump --data-only -f backup-data.sql

      - name: Stats
        run: |
          echo "Schema: $(wc -c < backup-schema.sql) bytes"
          echo "Data:   $(wc -c < backup-data.sql) bytes"
          gzip -9 backup-schema.sql backup-data.sql
          echo "Schema gz: $(wc -c < backup-schema.sql.gz) bytes"
          echo "Data   gz: $(wc -c < backup-data.sql.gz) bytes"

      - name: Upload as artifact
        uses: actions/upload-artifact@v4
        with:
          name: supabase-backup-${{ github.run_id }}-${{ github.run_attempt }}
          path: |
            backup-schema.sql.gz
            backup-data.sql.gz
          retention-days: 90
          compression-level: 0
